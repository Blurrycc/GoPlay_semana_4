<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Go Play! - Iniciar Sesión</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="estilos.css">
    </head>
    <body>

        <header>
            <nav class="navbar navbar-expand-lg navbar-dark sticky-top p-3 shadow-sm">
                <div class="container-fluid">
                    <a class="navbar-brand d-flex align-items-center" href="index.html">
                        <img src="imagenes/logo/logo_2.jpg" alt="Logo Go Play!" height="60" class="me-2">
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav mx-auto">
                            <li class="nav-item">
                                <a class="nav-link text-uppercase px-3 fw-bold" href="index.html">Volver a la Tienda</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <main class="container my-5">
            <div class="row justify-content-center">
                
                <div class="col-12 col-md-8 col-lg-5">
                    
                    <div class="card shadow-lg border-0 card-goplay">
                        <div class="card-body p-4 p-md-5">
                            
                            <div class="text-center mb-4">
                                <img src="imagenes/logo/logo_2.jpg" alt="Logo" class="img-fluid rounded shadow-sm mb-3" style="max-width: 190px;">
                                <h2 class="text-uppercase fw-bold" style="color: var(--gp-red-accent);">
                                    Iniciar Sesión
                                </h2>
                            </div>
                            <form id="formularioLogin" class="needs-validation" novalidate>
                            
                                <div class="mb-3">
                                    <label for="loginUsuario" class="form-label text-light">Correo electrónico o Usuario:</label>
                                    <input type="text" class="form-control text-bg-dark border-secondary" id="loginUsuario" name="usuario_login" placeholder="Tu alias gamer">
                                    <div class="invalid-feedback">Debes ingresar tu usuario o correo.</div>
                                </div>

                                <div class="mb-4">
                                    <label for="loginClave" class="form-label text-light">Contraseña:</label>
                                    <input type="password" class="form-control text-bg-dark border-secondary" id="loginClave" name="password_login" placeholder="Ingresa tu contraseña">
                                    <div class="invalid-feedback">La contraseña es obligatoria.</div>
                                    
                                    <div class="text-end mt-2">
                                        <a href="recuperar.html" class="text-decoration-none" style="color: var(--gp-text-muted); font-size: 0.9em; transition: color 0.3s;">¿Olvidaste tu contraseña?</a>
                                    </div>
                                </div>

                                <div id="mensajeErrorLogin" class="alert d-none text-center" role="alert"></div>

                                <div class="d-grid gap-2 mb-4">
                                    <button type="submit" class="btn btn-danger py-2 fw-bold" style="background-color: var(--gp-red-accent);">Ingresar a mi cuenta</button>
                                </div>
                                
                                <div class="text-center mt-3 pt-3 border-top border-secondary">
                                    <span style="color: var(--gp-text-muted);">¿Aún no tienes equipo? </span>
                                    <a href="registro.html" class="text-decoration-none fw-bold" style="color: var(--gp-red-accent); transition: color 0.3s;">Crear una cuenta</a>
                                </div>

                            </form>
                            
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
