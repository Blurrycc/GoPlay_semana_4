<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Play! - Mi Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark sticky-top p-3 shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="index.html">
                    <img src="imagenes/logo/logo_2.jpg" alt="Logo Go Play!" height="60" class="me-2">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link text-uppercase px-3 fw-bold" href="index.html">Volver a la Tienda</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-danger text-uppercase px-3 fw-bold" href="login.html">Cerrar Sesión</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <h2 class="text-uppercase fw-bold mb-4" style="color: var(--gp-text-light);">Panel de <span style="color: var(--gp-red-accent);">Usuario</span></h2>

        <div class="row g-4">
            
            <div class="col-12 col-lg-4">
                <div class="card shadow-lg border-0 card-goplay text-center p-4">
                    <div class="card-body">
                        <div class="mx-auto mb-3 d-flex align-items-center justify-content-center bg-dark text-secondary rounded-circle" style="width: 120px; height: 120px; border: 3px solid var(--gp-red-accent);">
                            <span class="fs-1 fw-bold">GP</span>
                        </div>
                        <h4 class="text-light fw-bold mb-1">GamerX_99</h4>
                        <p class="text-muted mb-3">Jugador Activo</p>
                        
                        <a href="carrito.html" class="btn btn-outline-light w-100 mb-2">Ver mis compras</a>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-8">
                <div class="card shadow-lg border-0" style="background-color: var(--gp-blue-card);">
                    <div class="card-body p-4 p-md-5">
                        
                        <h3 class="text-light mb-4 border-bottom border-secondary pb-2">Modificar Datos Personales</h3>
                        
                        <form id="formularioPerfil">
                            
                            <div class="row mb-3">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label for="perfilNombre" class="form-label text-light">Nombre completo:</label>
                                    <input type="text" class="form-control text-bg-dark border-secondary" id="perfilNombre" value="Juan Pérez">
                                </div>
                                <div class="col-md-6">
                                    <label for="perfilUsuario" class="form-label text-light">Nombre de usuario:</label>
                                    <input type="text" class="form-control text-bg-dark border-secondary" id="perfilUsuario" value="GamerX_99">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="perfilCorreo" class="form-label text-light">Correo electrónico:</label>
                                <input type="email" class="form-control text-bg-dark border-secondary" id="perfilCorreo" value="juan.gamer@correo.com">
                            </div>

                            <h4 class="text-light mt-4 mb-3 fs-5 border-bottom border-secondary pb-2">Cambiar Contraseña</h4>
                            
                            <div class="row mb-4">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label for="perfilClaveNueva" class="form-label text-light">Nueva contraseña:</label>
                                    <input type="password" class="form-control text-bg-dark border-secondary" id="perfilClaveNueva" placeholder="Deja en blanco para no cambiar">
                                </div>
                                <div class="col-md-6">
                                    <label for="perfilClaveRepetir" class="form-label text-light">Repetir nueva contraseña:</label>
                                    <input type="password" class="form-control text-bg-dark border-secondary" id="perfilClaveRepetir" placeholder="Confirma tu nueva clave">
                                </div>
                            </div>

                            <div id="mensajePerfil" class="alert d-none" role="alert"></div>

                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <button type="reset" class="btn btn-outline-secondary">Deshacer</button>
                                <button type="submit" class="btn btn-danger fw-bold" style="background-color: var(--gp-red-accent);">Guardar Cambios</button>
                            </div>

                        </form>
                        </div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
