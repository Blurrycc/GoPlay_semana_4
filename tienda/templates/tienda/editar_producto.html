{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'tienda/css/estilos.css' %}">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <h2 class="text-warning mb-4">Editar Producto: {{ producto.nombre }}</h2>
        <div class="card bg-secondary p-4">
            <form method="POST" action="" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label>Nombre:</label>
                    <input type="text" class="form-control" name="nombre_prod" value="{{ producto.nombre }}" required>
                </div>

                <div class="mb-3">
                    <label>Categoría:</label>
                    <select class="form-select" name="categoria_prod" required>
                        {% for c in categorias %}
                            <option value="{{ c.id }}" {% if c.id == producto.categoria.id %}selected{% endif %}>{{ c.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="row mb-3">
                    <div class="col-6">
                        <label>Precio:</label>
                        <input type="number" class="form-control" name="precio_prod" value="{{ producto.precio }}" required>
                    </div>
                    <div class="col-6">
                        <label>Stock:</label>
                        <input type="number" class="form-control" name="stock_prod" value="{{ producto.stock }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Cambiar Imagen (Opcional):</label>
                    <input type="file" class="form-control" name="imagen_prod" accept="image/*">
                </div>

                <button type="submit" class="btn btn-warning fw-bold">Guardar Cambios</button>
                <a href="{% url 'mantenedor' %}" class="btn btn-outline-light ms-2">Cancelar</a>
            </form>
        </div>
    </div>
</body>
</html>
