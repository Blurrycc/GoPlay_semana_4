{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Play! - Recuperar Contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'tienda/css/estilos.css' %}">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark sticky-top p-3 shadow-sm">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="{ % url 'index' %}">
                    <img src="{% static 'tienda/img/logo_2.jpg' %}" alt="Logo Go Play!" height="60" class="me-2">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item">
                            <a class="nav-link text-uppercase px-3 fw-bold" href="{% url 'index' %}">Volver a la Tienda</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            
            <div class="col-12 col-md-8 col-lg-5">
                
                <div class="card shadow-lg border-0 card-goplay">
                    <div class="card-body p-4 p-md-5">
                        
                        <div class="text-center mb-4">
                            <h2 class="text-uppercase fw-bold" style="color: var(--gp-red-accent);">
                                Recuperar Clave
                            </h2>
                            <p class="text-muted mt-2">Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.</p>
                        </div>
                        
                        <form id="formularioRecuperar">
                            
                            <div class="mb-4">
                                <label for="recuperarCorreo" class="form-label text-light">Correo electrónico:</label>
                                <input type="email" class="form-control text-bg-dark border-secondary" id="recuperarCorreo" placeholder="ejemplo@correo.com">
                            </div>

                            <div id="mensajeRecuperar" class="alert alert-danger d-none" role="alert"></div>

                            <div class="d-grid gap-2 mb-4">
                                <button type="submit" class="btn btn-danger py-2 fw-bold" style="background-color: var(--gp-red-accent);">Enviar enlace</button>
                            </div>
                            
                            <div class="text-center mt-3 pt-3 border-top border-secondary">
                                <span style="color: var(--gp-text-muted);">¿Lo recordaste? </span>
                                <a href="{% url 'login' %}" class="text-decoration-none fw-bold" style="color: var(--gp-red-accent); transition: color 0.3s;">Volver a iniciar sesión</a>
                            </div>

                        </form>
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
